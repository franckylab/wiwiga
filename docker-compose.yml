# ==================================
# WIWIGA - Docker Compose Configuration
# ==================================
# Description: Environment complet avec PostgreSQL, Redis et Backend
# Version: 1.0 - 2026-06-24

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wiwiga_postgres
    environment:
      POSTGRES_USER: wiwiga_user
      POSTGRES_PASSWORD: wiwiga_password
      POSTGRES_DB: wiwiga_dev
    ports:
      - "8001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiwiga_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: wiwiga_redis
    ports:
      - "8002:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elixir/Phoenix Backend
  backend:
    build:
      context: ./game_hub
      dockerfile: ../Dockerfile.backend
    container_name: wiwiga_backend
    environment:
      MIX_ENV: dev
      DATABASE_URL: postgresql://wiwiga_user:wiwiga_password@postgres:5432/wiwiga_dev
      REDIS_URL: redis://redis:6379
      SECRET_KEY_BASE: dev_secret_key_base_change_in_production
      PORT: 4001
    ports:
      - "8000:4001"
    volumes:
      - ./game_hub:/app
      - deps_data:/app/deps
      - build_data:/app/_build
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "
        mix ecto.create &&
        mix ecto.migrate &&
        echo 'Starting Phoenix server...' &&
        mix phx.server
      "

  # Flutter Web Frontend
  frontend:
    build:
      context: ./wiwiga_app
      dockerfile: Dockerfile
    container_name: wiwiga_frontend
    ports:
      - "8003:80"  # Frontend Flutter Web
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:4001

volumes:
  postgres_data:
  redis_data:
  deps_data:
  build_data:
