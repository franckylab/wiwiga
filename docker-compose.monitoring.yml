# ==================================
# WIWIGA - Monitoring Stack Configuration
# ==================================
# Services: Prometheus + Grafana + ELK Stack
# Version: 1.0 - 2026-06-24

services:
  # ==========================================
  # PROMETHEUS - Métriques et Monitoring
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: wiwiga_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - wiwiga_monitoring
    restart: unless-stopped

  # ==========================================
  # GRAFANA - Dashboards de Visualisation
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: wiwiga_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=wiwiga_admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - wiwiga_monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # ==========================================
  # ELASTICSEARCH - Stockage Logs
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: wiwiga_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=wiwiga-logs
      - "cluster.routing.allocation.disk.threshold_enabled=true"
      - "cluster.routing.allocation.disk.watermark.low=95%"
      - "cluster.routing.allocation.disk.watermark.high=97%"
      - "cluster.routing.allocation.disk.watermark.flood_stage=98%"
    ports:
      - "9300:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - wiwiga_monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # LOGSTASH - Collecte et Transformation Logs
  # ==========================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.0
    container_name: wiwiga_logstash
    ports:
      - "5144:5044"
      - "5500:5000/tcp"
      - "5500:5000/udp"
      - "9700:9600"
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    networks:
      - wiwiga_monitoring
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # KIBANA - Visualisation Logs
  # ==========================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.0
    container_name: wiwiga_kibana
    ports:
      - "5700:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - wiwiga_monitoring
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # NODE EXPORTER - Métriques Système
  # ==========================================
  node_exporter:
    image: prom/node-exporter:latest
    container_name: wiwiga_node_exporter
    ports:
      - "9200:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - wiwiga_monitoring
    restart: unless-stopped

networks:
  wiwiga_monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  kibana_data:
