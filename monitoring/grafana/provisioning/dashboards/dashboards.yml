# Grafana Dashboards Provisioning
apiVersion: 1

providers:
  - name: 'WIWIGA Dashboards'
    orgId: 1
    folder: 'WIWIGA'
    folderUid: 'wiwiga'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
