# Logstash Pipeline Configuration
input {
  # Backend Phoenix logs (via TCP)
  tcp {
    port => 5000
    codec => json
    type => "wiwiga_backend"
  }

  # Docker logs (via Filebeat ou directement)
  beats {
    port => 5044
    type => "docker_logs"
  }

  # Syslog
  syslog {
    port => 5514
    type => "syslog"
  }
}

filter {
  # Parser les logs backend Phoenix
  if [type] == "wiwiga_backend" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:level}\] %{GREEDYDATA:log_message}" 
      }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
    
    mutate {
      remove_field => [ "timestamp" ]
    }
  }

  # Parser les logs PostgreSQL
  if [type] == "postgresql" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{NUMBER:pid}\] %{LOGLEVEL:level} %{GREEDYDATA:log_message}"
      }
    }
  }

  # Ajouter des métadonnées
  mutate {
    add_field => { 
      "environment" => "development"
      "service" => "wiwiga"
    }
  }
}

output {
  # Envoyer à Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "wiwiga-logs-%{+YYYY.MM.dd}"
  }

  # Debug stdout (optionnel)
  # stdout { 
  #   codec => rubydebug 
  # }
}
