# Prometheus Configuration pour WIWIGA
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files: []

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend Phoenix/Elixir (health check simple)
  # Pour des métriques complètes, ajouter prometheus_ex à votre mix.exs
  - job_name: 'wiwiga_backend'
    metrics_path: '/api/health'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['wiwiga_backend:4001']

  # Node Exporter (système)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  # PostgreSQL (nécessite postgres_exporter - optionnel)
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['wiwiga_postgres:5432']
  #   scrape_interval: 30s

  # Redis (nécessite redis_exporter - optionnel)
